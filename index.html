.checkin-btn-area .checkin-done-btn:active{transform:translateY(4px);box-shadow:0 1px 0 0 var(--kids-focus-shadow)}.checkin-btn-area .checkin-done-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;box-shadow:none}
#screen-shooting{background:linear-gradient(180deg,#1a1a2e,#16213e,#0f3460);color:#fff}
.shooting-hud{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(0,0,0,0.3);flex-shrink:0;gap:8px;flex-wrap:wrap}
.shooting-hud .hud-item{display:flex;align-items:center;gap:6px;font-family:var(--font-display);font-weight:700;font-size:clamp(14px,3vw,18px)}.shooting-hud .hud-item .hud-val{color:var(--kids-focus);min-width:28px;text-align:center}
.shooting-hud .hud-btn{padding:6px 14px;border-radius:20px;border:none;background:rgba(255,255,255,0.15);color:#fff;font-family:var(--font-display);font-weight:600;font-size:13px;cursor:pointer;touch-action:manipulation}
.shooting-game-area{flex:1;position:relative;overflow:hidden;cursor:crosshair}
.shooting-target{position:absolute;display:flex;align-items:center;justify-content:center;border-radius:999px;padding:0 16px;white-space:nowrap;font-family:var(--font-display);font-weight:700;cursor:pointer;touch-action:manipulation;will-change:transform,left,top;z-index:1;box-shadow:0 4px 15px rgba(0,0,0,0.3);text-shadow:0 1px 3px rgba(0,0,0,0.3)}
.shooting-target.pop{animation:targetPop 0.3s ease forwards}
@keyframes targetPop{0%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.5}100%{transform:scale(0);opacity:0}}
.shooting-target.wrong-hit{animation:wrongShake 0.4s ease}
@keyframes wrongShake{0%,100%{transform:scale(1)}25%{transform:scale(1.1)rotate(-8deg)}50%{transform:scale(1.1)rotate(8deg)}75%{transform:scale(1.1)rotate(-4deg)}}
.combo-text{position:absolute;font-family:var(--font-display);font-weight:900;font-size:28px;color:var(--kids-focus);pointer-events:none;animation:comboUp 1s ease forwards;z-index:10;text-shadow:0 2px 10px rgba(255,204,0,0.5)}
@keyframes comboUp{0%{opacity:1;transform:translateY(0)scale(1)}100%{opacity:0;transform:translateY(-80px)scale(1.3)}}
.shooting-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);z-index:20;padding:30px;text-align:center;gap:12px}
.shooting-overlay h2{font-family:var(--font-display);font-size:clamp(28px,6vw,40px);font-weight:900;color:var(--kids-focus)}.shooting-overlay p{font-size:clamp(16px,3.5vw,20px);color:#fff}
.shooting-overlay .result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:10px 0}.shooting-overlay .result-stat{text-align:center}.shooting-overlay .result-stat .rs-num{font-family:var(--font-display);font-size:clamp(24px,5vw,32px);font-weight:800;color:var(--kids-focus)}.shooting-overlay .result-stat .rs-label{font-size:13px;color:rgba(255,255,255,0.7)}
.confetti-container{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden}
.confetti-piece{position:absolute;width:10px;height:10px;top:-10px;animation:confettiFall var(--fall-duration,3s) ease-in forwards;animation-delay:var(--fall-delay,0s)}
@keyframes confettiFall{0%{transform:translateY(0)rotate(0)scale(1);opacity:1}100%{transform:translateY(100vh)rotate(720deg)scale(.3);opacity:0}}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}.bounce-anim{animation:bounce 0.4s ease}
@media(max-width:480px){.grade-grid{gap:8px}.mode-grid{gap:10px}.quiz-options{gap:8px}.quiz-option{padding:12px 14px;font-size:15px}}
@media(min-width:768px){.flip-card{max-width:420px}.card-area{padding:30px}}
@media(min-width:1024px){.flip-card{max-width:460px}.menu-body,.units-body{padding:30px 40px;max-width:700px;margin:0 auto;width:100%}}

<body>
<div class="app" id="app" data-component="AppRoot">
<main data-component="MainContent">

<div class="screen active" id="screen-home" data-component="GradeSelection">
  <div class="home-header"><h1>单词<span>大冒险</span></h1><p>人教版英语 · 选择年级开始</p></div>
  <div class="grade-grid" id="gradeGrid"></div>
</div>

<div class="screen" id="screen-units" data-component="UnitSelection">
  <div class="units-header"><button onclick="showScreen('screen-home')" aria-label="返回">&#x2190;</button><h2 id="unitsTitle">选择单元</h2></div>
  <div class="semester-tabs"><button class="sem-tab active" id="semTab1" onclick="switchSemester(1)" aria-label="上学期">上学期</button><button class="sem-tab" id="semTab2" onclick="switchSemester(2)" aria-label="下学期">下学期</button></div>
  <div class="units-body" id="unitsBody"></div>
</div>

<div class="screen" id="screen-menu" data-component="GradeMenu">
  <div class="menu-header"><button onclick="showScreen('screen-units');renderUnits()" aria-label="返回单元">&#x2190;</button><h2 id="menuTitle">单元</h2></div>
  <div class="menu-body">
    <div class="menu-stats"><div class="stat-card"><div class="stat-num" id="statLearned">0</div><div class="stat-label">已掌握</div></div><div class="stat-card"><div class="stat-num" id="statStreak">0</div><div class="stat-label">连续打卡🔥</div></div><div class="stat-card"><div class="stat-num" id="statTotal">0</div><div class="stat-label">本单元单词</div></div></div>
    <div class="mode-grid">
      <div class="mode-card" onclick="startLearning()"><div class="mode-icon">📖</div><div class="mode-name">单词学习</div><div class="mode-desc">翻转卡片记单词，听发音看例句</div></div>
      <div class="mode-card" onclick="startShooting()"><div class="mode-icon">🎯</div><div class="mode-name">射击闯关</div><div class="mode-desc">瞄准射击，在游戏中巩固记忆</div></div>
      <div class="mode-card" onclick="startQuiz()"><div class="mode-icon">✍️</div><div class="mode-name">小测验</div><div class="mode-desc">选择题+拼写，检验学习成果</div></div>
      <div class="mode-card" onclick="startCheckin()"><div class="mode-icon">📅</div><div class="mode-name">每日打卡</div><div class="mode-desc">坚持打卡，养成学习好习惯</div></div>
    </div>
  </div>
</div>

<div class="screen" id="screen-learning" data-component="CardLearning">
  <div class="learn-header"><button class="back-btn" onclick="goToMenu()" aria-label="返回菜单">&#x2190;</button><div class="progress-info"><div class="grade-tag" id="learnGradeTag" style="background:var(--grade-color)">三年级</div><div class="progress-text" id="learnProgress">第 1 / 8 个</div></div><button class="btn-icon btn-ghost" onclick="speakCurrentWord()" title="朗读" aria-label="朗读单词" style="font-size:20px;border:none;background:transparent;cursor:pointer;">🔊</button></div>
  <div class="learn-progress-bar"><div class="bar-fill" id="learnBarFill" style="width:0%"></div></div>
  <div class="card-area"><div class="flip-card" id="flipCard" onclick="toggleFlip()">
    <div class="card-face card-front"><div class="word-display" id="cardWord">apple</div><div class="phonetic" id="cardPhonetic">/ˈæp.əl/</div><button class="speak-btn" onclick="event.stopPropagation();speakCurrentWord()" aria-label="发音朗读">🔊</button><div class="card-hint">点击翻转查看释义</div></div>
    <div class="card-face card-back"><div class="meaning" id="cardMeaning">苹果</div><div class="pos" id="cardPos">n.</div><div class="example" id="cardExample">I eat an apple.</div><div class="example-trans" id="cardExampleTrans">我吃了一个苹果。</div></div>
  </div></div>
  <div class="learn-footer"><button class="nav-btn" id="prevBtn" onclick="prevWord()" aria-label="上一个">&#x25C0;</button><button class="master-btn" id="masterBtn" onclick="toggleMaster()" aria-label="标记已掌握">✓ 已掌握</button><button class="nav-btn" id="nextBtn" onclick="nextWord()" aria-label="下一个">&#x25B6;</button></div>
</div>

<div class="screen" id="screen-shooting" data-component="ShootingGame">
  <div class="shooting-hud"><div class="hud-item"><span>⭐</span><span class="hud-val" id="shootScore">0</span></div><div class="hud-item"><span>🔥</span><span class="hud-val" id="shootCombo">0</span></div><div class="hud-item"><span>⏱️</span><span class="hud-val" id="shootTime">60</span></div><div class="hud-item"><span>🎯</span><span class="hud-val" id="shootRound">1/3</span></div><button class="hud-btn" onclick="exitShooting()" aria-label="退出">退出</button></div>
  <div class="shooting-game-area" id="shootArea"></div>
</div>

<div class="screen" id="screen-quiz" data-component="Quiz">
  <div class="quiz-header"><button onclick="exitQuiz()" aria-label="返回菜单">&#x2190;</button><div class="quiz-progress" id="quizProgress">第 1 / 10 题</div><div class="quiz-score" id="quizScore">0 分</div></div>
  <div class="quiz-progress-bar"><div class="bar-fill" id="quizBarFill" style="width:0%"></div></div>
  <div class="quiz-body" id="quizBody"></div>
</div>

<div class="screen" id="screen-checkin" data-component="DailyCheckin">
  <div class="checkin-header"><button onclick="goToMenu()" aria-label="返回菜单">&#x2190;</button><h2>每日打卡</h2></div>
  <div class="checkin-body">
    <div class="checkin-streak"><div class="streak-fire">🔥</div><div class="streak-info"><div class="streak-num" id="streakNum">0</div><div class="streak-label">连续打卡天数</div></div></div>
    <div class="checkin-stats"><div class="stat-card"><div class="stat-num" id="ciTotalDays">0</div><div class="stat-label">总打卡</div></div><div class="stat-card"><div class="stat-num" id="ciThisMonth">0</div><div class="stat-label">本月天数</div></div><div class="stat-card"><div class="stat-num" id="ciWordsLearned">0</div><div class="stat-label">已学单词</div></div></div>
    <div class="checkin-calendar" id="checkinCalendar"></div>
    <div class="checkin-btn-area"><button class="checkin-done-btn" id="checkinBtn" onclick="doCheckin()">✅ 今日打卡</button></div>
  </div>
</div>

</main>
</div>

const GRADE_INFO={1:{label:'一年级',icon:'🌱',theme:'grade-theme-1'},2:{label:'二年级',icon:'🌿',theme:'grade-theme-2'},3:{label:'三年级',icon:'🍎',theme:'grade-theme-3'},4:{label:'四年级',icon:'🌸',theme:'grade-theme-4'},5:{label:'五年级',icon:'⭐',theme:'grade-theme-5'},6:{label:'六年级',icon:'🌈',theme:'grade-theme-6'},7:{label:'七年级',icon:'📚',theme:'grade-theme-7'},8:{label:'八年级',icon:'🚀',theme:'grade-theme-8'},9:{label:'九年级',icon:'🏆',theme:'grade-theme-9'}};

let state={currentGrade:3,currentSemester:1,currentUnit:1,currentWordIndex:0,isFlipped:false,masteredWords:JSON.parse(localStorage.getItem('qw_mastered')||'{}'),checkinData:JSON.parse(localStorage.getItem('qw_checkin')||'{"dates":[],"streak":0}'),shootingActive:false,quizState:null,calMonth:new Date().getMonth(),calYear:new Date().getFullYear()};

function getWords(){const g=state.currentGrade,s=state.currentSemester,u=state.currentUnit;const gd=WORD_DATA[g];if(!gd||!gd.semesters||!gd.semesters[s]||!gd.semesters[s].units[u])return WORD_DATA[3].semesters[1].units[1].words;return gd.semesters[s].units[u].words}
function getUnitInfo(){const g=state.currentGrade,s=state.currentSemester,u=state.currentUnit;const gd=WORD_DATA[g];if(!gd||!gd.semesters||!gd.semesters[s]||!gd.semesters[s].units[u])return WORD_DATA[3].semesters[1].units[1];return gd.semesters[s].units[u]}
function getKey(){return `g${state.currentGrade}s${state.currentSemester}u${state.currentUnit}`}

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}

function initGradeGrid(){const grid=document.getElementById('gradeGrid');grid.innerHTML='';for(let g=1;g<=9;g++){const info=GRADE_INFO[g];const card=document.createElement('div');card.className=`grade-card ${info.theme}`;card.innerHTML=`<div class="grade-icon">${info.icon}</div><div class="grade-num">${g}</div><div class="grade-label">${info.label}</div>`;card.addEventListener('click',()=>selectGrade(g));grid.appendChild(card)}}

function selectGrade(g){state.currentGrade=g;state.currentSemester=1;state.currentUnit=1;document.getElementById('semTab1').classList.add('active');document.getElementById('semTab2').classList.remove('active');renderUnits();const info=GRADE_INFO[g];document.getElementById('unitsTitle').textContent=info.label+' - 选择单元';document.getElementById('screen-units').className=`screen ${info.theme}`;showScreen('screen-units')}

function switchSemester(sem){state.currentSemester=sem;state.currentUnit=1;document.getElementById('semTab1').classList.toggle('active',sem===1);document.getElementById('semTab2').classList.toggle('active',sem===2);renderUnits()}

function renderUnits(){const g=state.currentGrade,s=state.currentSemester;const gd=WORD_DATA[g];if(!gd||!gd.semesters||!gd.semesters[s])return;const sem=gd.semesters[s];const body=document.getElementById('unitsBody');body.innerHTML='';Object.keys(sem.units).forEach(function(key){const unit=sem.units[key];const card=document.createElement('div');card.className='unit-card';card.innerHTML=`<div class="unit-icon">${unit.icon}</div><div class="unit-info"><div class="unit-name">${unit.name}</div><div class="unit-desc">${unit.words.length} 个单词</div></div><div class="unit-arrow">&#x25B6;</div>`;card.addEventListener('click',function(){state.currentUnit=parseInt(key);const info=GRADE_INFO[g];document.getElementById('menuTitle').textContent=info.label+' · '+sem.name+' · '+unit.name;document.getElementById('screen-menu').className=`screen ${info.theme}`;updateMenuStats();showScreen('screen-menu')});body.appendChild(card)})}

function updateMenuStats(){const words=getWords();const key=getKey();const mastered=state.masteredWords[key]||[];document.getElementById('statLearned').textContent=mastered.length;document.getElementById('statStreak').textContent=state.checkinData.streak||0;document.getElementById('statTotal').textContent=words.length}
function goToMenu(){showScreen('screen-menu');updateMenuStats()}

function startLearning(){state.currentWordIndex=0;state.isFlipped=false;const info=GRADE_INFO[state.currentGrade];document.getElementById('learnGradeTag').textContent=info.label+' · '+getUnitInfo().name;document.getElementById('learnGradeTag').style.background=getComputedStyle(document.documentElement).getPropertyValue('--grade-color')||'#19C8B9';document.getElementById('screen-learning').className=`screen grade-theme-${state.currentGrade}`;showScreen('screen-learning');renderCard()}

function renderCard(){const words=getWords();const i=state.currentWordIndex;const w=words[i];if(!w)return;document.getElementById('cardWord').textContent=w.word;document.getElementById('cardPhonetic').textContent=w.phonetic;document.getElementById('cardMeaning').textContent=w.meaning;document.getElementById('cardPos').textContent=w.pos;document.getElementById('cardExample').textContent=w.example;document.getElementById('cardExampleTrans').textContent=w.exampleTrans;document.getElementById('learnProgress').textContent=`第 ${i+1} / ${words.length} 个`;document.getElementById('learnBarFill').style.width=`${((i+1)/words.length)*100}%`;const key=getKey();const mastered=state.masteredWords[key]||[];const btn=document.getElementById('masterBtn');if(mastered.includes(w.word)){btn.textContent='✓ 已掌握';btn.classList.add('mastered')}else{btn.textContent='○ 标记已掌握';btn.classList.remove('mastered')}document.getElementById('prevBtn').disabled=i===0;document.getElementById('nextBtn').disabled=i===words.length-1;const card=document.getElementById('flipCard');card.classList.remove('flipped');state.isFlipped=false}

function toggleFlip(){const card=document.getElementById('flipCard');state.isFlipped=!state.isFlipped;card.classList.toggle('flipped',state.isFlipped)}
function nextWord(){const words=getWords();if(state.currentWordIndex<words.length-1){state.currentWordIndex++;state.isFlipped=false;renderCard()}}
function prevWord(){if(state.currentWordIndex>0){state.currentWordIndex--;state.isFlipped=false;renderCard()}}
function toggleMaster(){const words=getWords();const w=words[state.currentWordIndex];const key=getKey();if(!state.masteredWords[key])state.masteredWords[key]=[];const list=state.masteredWords[key];const idx=list.indexOf(w.word);if(idx>-1){list.splice(idx,1)}else{list.push(w.word);document.getElementById('masterBtn').classList.add('bounce-anim');setTimeout(()=>document.getElementById('masterBtn').classList.remove('bounce-anim'),400)}localStorage.setItem('qw_mastered',JSON.stringify(state.masteredWords));renderCard()}
function speakCurrentWord(){const words=getWords();const w=words[state.currentWordIndex];if(!w)return;speakWord(w.word)}

// ===== 发音：有道词典TTS + Web Speech API 兜底 =====
let speechVoices=[];
function initSpeech(){if(!window.speechSynthesis)return;const load=()=>{speechVoices=window.speechSynthesis.getVoices()};load();if(window.speechSynthesis.onvoiceschanged!==undefined)window.speechSynthesis.onvoiceschanged=load}
function speakWord(text){
  try{
    const audio=new Audio('https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(text)+'&type=2');
    audio.volume=1.0;
    audio.play().catch(function(){speakFallback(text)});
    setTimeout(function(){if(audio.readyState===0){speakFallback(text)}},3000);
  }catch(e){speakFallback(text)}
}
function speakFallback(text){
  if(!window.speechSynthesis)return;
  try{
    window.speechSynthesis.cancel();window.speechSynthesis.resume();
    const utter=new SpeechSynthesisUtterance(text);
    utter.lang='en-US';utter.rate=0.85;utter.pitch=1.0;utter.volume=1.0;
    if(speechVoices.length===0)speechVoices=window.speechSynthesis.getVoices();
    const enVoice=speechVoices.find(function(v){return v.lang.startsWith('en')});
    if(enVoice)utter.voice=enVoice;
    window.speechSynthesis.speak(utter);
  }catch(e){}
}

// ===== 射击游戏 =====
let shootInterval=null,shootAnimFrame=null;
function startShooting(){document.getElementById('shootArea').innerHTML='';document.getElementById('shootScore').textContent='0';document.getElementById('shootCombo').textContent='0';document.getElementById('shootTime').textContent='60';document.getElementById('shootRound').textContent='1/3';state.shootingActive={score:0,combo:0,maxCombo:0,timeLeft:60,round:1,totalRounds:3,hits:0,misses:0,targets:[],isPlaying:true};showScreen('screen-shooting');startShootRound()}
function startShootRound(){const s=state.shootingActive;if(!s)return;s.hits=0;s.misses=0;s.isPlaying=true;s.timeLeft=60;s.combo=0;document.getElementById('shootArea').innerHTML=`<div class="shooting-overlay" id="shootOverlay"><h2>🎯 第 ${s.round} 关</h2><p>点击正确的英文单词！</p><button class="btn btn-primary btn-large" onclick="startShootTimer()" style="margin-top:12px;">开始！</button></div>`}
function startShootTimer(){const ov=document.getElementById('shootOverlay');if(ov)ov.remove();const s=state.shootingActive;if(!s)return;spawnTargets();if(shootInterval)clearInterval(shootInterval);shootInterval=setInterval(function(){if(!state.shootingActive||!state.shootingActive.isPlaying){clearInterval(shootInterval);return}s.timeLeft--;document.getElementById('shootTime').textContent=s.timeLeft;if(s.timeLeft<=0)endShootRound()},1000);if(shootAnimFrame)cancelAnimationFrame(shootAnimFrame);let lastTime=Date.now();function moveTargets(){if(!state.shootingActive||!state.shootingActive.isPlaying)return;const now=Date.now();const dt=(now-lastTime)/1000;lastTime=now;const area=document.getElementById('shootArea');const rect=area.getBoundingClientRect();document.querySelectorAll('.shooting-target').forEach(function(el){let x=parseFloat(el.dataset.x)||0,y=parseFloat(el.dataset.y)||0,dx=parseFloat(el.dataset.dx)||0,dy=parseFloat(el.dataset.dy)||0;const ew=el.offsetWidth||70,eh=el.offsetHeight||70;x+=dx*dt;y+=dy*dt;if(x<0){x=0;dx=Math.abs(dx)}if(x>rect.width-ew-4){x=rect.width-ew-4;dx=-Math.abs(dx)}if(y<40){y=40;dy=Math.abs(dy)}if(y>rect.height-eh-4){y=rect.height-eh-4;dy=-Math.abs(dy)}el.dataset.x=x;el.dataset.y=y;el.dataset.dx=dx;el.dataset.dy=dy;el.style.left=x+'px';el.style.top=y+'px'});shootAnimFrame=requestAnimationFrame(moveTargets)}moveTargets()}

function spawnTargets(){
  const area=document.getElementById('shootArea');
  const words=getWords();
  const s=state.shootingActive;if(!s)return;
  const currentWord=words[Math.floor(Math.random()*words.length)];
  s.currentWord=currentWord;
  area.innerHTML='';
  const rect=area.getBoundingClientRect();
  const targetCount=Math.min(5+s.round*2,10);
  const distractors=words.filter(function(w){return w.word!==currentWord.word});
  const shuffledD=distractors.sort(function(){return Math.random()-0.5}).slice(0,targetCount-1);
  const targets=[{word:currentWord,correct:true}];
  shuffledD.forEach(function(w){targets.push({word:w,correct:false})});
  targets.sort(function(){return Math.random()-0.5});
  const colors=['#FF6B6B','#FF9F43','#FECA57','#48DBFB','#0ABDE3','#10AC84','#FF9FF3','#1DD1A1','#F368E0'];
  targets.forEach(function(t,i){
    const el=document.createElement('div');
    var wlen=t.word.word.length;
    var h=52+Math.random()*8;
    var minW=Math.max(h,wlen*13+28);
    el.className='shooting-target';
    el.style.minWidth=minW+'px';
    el.style.width='auto';
    el.style.height=h+'px';
    el.style.padding='0 14px';
    el.style.background=colors[i%colors.length];
    el.style.fontSize=(wlen>10?12:wlen>7?14:16)+'px';
    el.textContent=t.word.word;
    el.dataset.word=t.word.word;
    el.dataset.correct=t.correct?'true':'false';
    var rx=Math.random()*(rect.width-minW-20),ry=60+Math.random()*(rect.height-h-80);
    el.style.left=rx+'px';el.style.top=ry+'px';
    el.dataset.x=rx;el.dataset.y=ry;
    el.dataset.dx=(Math.random()-0.5)*80;
    el.dataset.dy=(Math.random()-0.5)*60;
    el.addEventListener('click',function(e){e.stopPropagation();shootTarget(el,t)});
    area.appendChild(el);
  });
  var qEl=document.createElement('div');
  qEl.style.cssText='position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.5);color:#fff;padding:6px 18px;border-radius:20px;font-family:var(--font-display);font-weight:700;font-size:clamp(14px,3vw,18px);z-index:5;white-space:nowrap;text-align:center;';
  qEl.textContent='🔊 找到「'+currentWord.meaning+'」的英文！';
  qEl.id='shootQuestion';
  area.appendChild(qEl);
}

function shootTarget(el,target){const s=state.shootingActive;if(!s||!s.isPlaying||el.classList.contains('pop'))return;if(target.correct){el.classList.add('pop');setTimeout(()=>el.remove(),300);s.score+=10+s.combo*2;s.combo++;if(s.combo>s.maxCombo)s.maxCombo=s.combo;s.hits++;document.getElementById('shootScore').textContent=s.score;document.getElementById('shootCombo').textContent=s.combo;if(s.combo>=3){const ct=document.createElement('div');ct.className='combo-text';ct.textContent=`🔥 ${s.combo}连击!`;ct.style.left=(parseFloat(el.style.left)-20)+'px';ct.style.top=(parseFloat(el.style.top)-20)+'px';document.getElementById('shootArea').appendChild(ct);setTimeout(()=>ct.remove(),1000)}speakWord(target.word.word);setTimeout(()=>{if(state.shootingActive&&state.shootingActive.isPlaying)spawnTargets()},300)}else{el.classList.add('wrong-hit');setTimeout(()=>el.classList.remove('wrong-hit'),400);s.combo=0;s.misses++;document.getElementById('shootCombo').textContent='0';const q=document.getElementById('shootQuestion');if(q){q.style.color='#FF6B6B';setTimeout(()=>{if(q)q.style.color='#fff'},400)}}}
function endShootRound(){const s=state.shootingActive;if(!s)return;s.isPlaying=false;if(shootInterval)clearInterval(shootInterval);if(shootAnimFrame)cancelAnimationFrame(shootAnimFrame);document.getElementById('shootArea').innerHTML=`<div class="shooting-overlay"><h2>${s.round>=s.totalRounds?'🎉 闯关完成！':'⏰ 时间到！'}</h2><div class="result-stats"><div class="result-stat"><div class="rs-num">${s.score}</div><div class="rs-label">总得分</div></div><div class="result-stat"><div class="rs-num">${s.hits}</div><div class="rs-label">命中数</div></div><div class="result-stat"><div class="rs-num">${s.maxCombo}</div><div class="rs-label">最高连击</div></div></div>${s.round<s.totalRounds?`<button class="btn btn-primary btn-large" onclick="nextShootRound()">下一关 🚀</button>`:`<button class="btn btn-primary btn-large" onclick="exitShooting()">完成 🎉</button>`}<button class="btn btn-secondary btn-small" onclick="exitShooting()">返回菜单</button></div>`}
function nextShootRound(){state.shootingActive.round++;document.getElementById('shootRound').textContent=`${state.shootingActive.round}/${state.shootingActive.totalRounds}`;startShootRound()}
function exitShooting(){if(shootInterval)clearInterval(shootInterval);if(shootAnimFrame)cancelAnimationFrame(shootAnimFrame);state.shootingActive=null;goToMenu()}

// ===== 测验 =====
function startQuiz(){const words=getWords();const shuffled=[...words].sort(()=>Math.random()-0.5);const selected=shuffled.slice(0,Math.min(10,words.length));state.quizState={words:selected,index:0,score:0,answers:[],total:selected.length};showScreen('screen-quiz');renderQuiz()}
function renderQuiz(){const qs=state.quizState;if(!qs)return;const w=qs.words[qs.index];if(!w){finishQuiz();return}document.getElementById('quizProgress').textContent=`第 ${qs.index+1} / ${qs.total} 题`;document.getElementById('quizScore').textContent=`${qs.score} 分`;document.getElementById('quizBarFill').style.width=`${(qs.index/qs.total)*100}%`;const body=document.getElementById('quizBody');const qType=Math.random()<0.6?'choice-en':(Math.random()<0.5?'choice-zh':'spelling');if(qType==='choice-en'){const all=getWords();const opts=[w,...all.filter(x=>x.word!==w.word).sort(()=>Math.random()-0.5).slice(0,3)];opts.sort(()=>Math.random()-0.5);body.innerHTML=`<div class="quiz-question"><div class="q-label">看中文选英文</div><div class="q-translation">${w.meaning}</div></div><div class="quiz-options">${opts.map(o=>`<button class="quiz-option" data-word="${o.word}" data-correct="${o.word===w.word}" onclick="answerQuiz(this,'${o.word}','${w.word}')">${o.word}</button>`).join('')}</div>`}else if(qType==='choice-zh'){setTimeout(()=>speakWord(w.word),300);const all=getWords();const opts=[w,...all.filter(x=>x.word!==w.word).sort(()=>Math.random()-0.5).slice(0,3)];opts.sort(()=>Math.random()-0.5);body.innerHTML=`<div class="quiz-question"><div class="q-label">👂 听发音选意思</div><div class="q-word" style="font-size:24px;color:var(--color-action-primary);cursor:pointer;" onclick="speakWord('${w.word}')">🔊 点击重新听</div></div><div class="quiz-options">${opts.map(o=>`<button class="quiz-option" data-correct="${o.word===w.word}" onclick="answerQuiz(this,'${o.meaning}','${w.meaning}')">${o.meaning}</button>`).join('')}</div>`}else{body.innerHTML=`<div class="quiz-question"><div class="q-label">👆 拼写单词</div><div class="q-translation">${w.meaning}</div><div class="q-hint">音标：${w.phonetic}</div></div><div class="quiz-spelling"><input type="text" id="spellInput" placeholder="输入英文单词..." aria-label="拼写英文单词" autocomplete="off" autocapitalize="none" spellcheck="false"><div class="spell-hint">按 Enter 确认</div></div>`;setTimeout(()=>{const inp=document.getElementById('spellInput');if(inp){inp.focus();inp.addEventListener('keydown',e=>{if(e.key==='Enter')checkSpelling(inp.value.trim(),w)})}},100)}}
function answerQuiz(btn,selected,correct){const parent=btn.parentElement;const isCorrect=selected===correct;parent.querySelectorAll('.quiz-option').forEach(b=>b.disabled=true);if(isCorrect){btn.classList.add('correct');state.quizState.score+=10}else{btn.classList.add('wrong');parent.querySelectorAll('.quiz-option').forEach(b=>{if(b.dataset.correct==='true')b.classList.add('reveal')})}state.quizState.answers.push({word:state.quizState.words[state.quizState.index].word,correct:isCorrect});document.getElementById('quizScore').textContent=`${state.quizState.score} 分`;setTimeout(()=>{state.quizState.index++;state.quizState.index>=state.quizState.total?finishQuiz():renderQuiz()},1000)}
function checkSpelling(input,word){const isCorrect=input.toLowerCase()===word.word.toLowerCase();state.quizState.answers.push({word:word.word,correct:isCorrect});if(isCorrect){state.quizState.score+=10;document.getElementById('quizScore').textContent=`${state.quizState.score} 分`;const inp=document.getElementById('spellInput');if(inp){inp.style.borderColor='var(--color-state-success)';inp.disabled=true}}else{const inp=document.getElementById('spellInput');if(inp){inp.style.borderColor='var(--kids-danger)';inp.disabled=true}const hint=document.querySelector('.spell-hint');if(hint)hint.textContent=`正确答案：${word.word}`}setTimeout(()=>{state.quizState.index++;state.quizState.index>=state.quizState.total?finishQuiz():renderQuiz()},1200)}
function finishQuiz(){const qs=state.quizState;const correctCount=qs.answers.filter(a=>a.correct).length;const pct=Math.round(correctCount/qs.total*100);let emoji,msg;if(pct>=90){emoji='🏆';msg='太棒了！你是单词大师！'}else if(pct>=70){emoji='⭐';msg='很不错！继续保持！'}else if(pct>=50){emoji='💪';msg='还可以，多练练会更好！'}else{emoji='📖';msg='加油，回去再学习一下吧！'}const wrongWords=qs.answers.filter(a=>!a.correct).map(a=>a.word);document.getElementById('quizBody').innerHTML=`<div class="quiz-result"><div class="result-emoji">${emoji}</div><div class="result-score">${qs.score}/${qs.total*10}</div><div class="result-msg">${msg}（正确率 ${pct}%）</div>${wrongWords.length>0?`<div class="result-detail"><div style="font-weight:600;margin-bottom:6px;color:var(--color-text-primary);">需要复习的单词：</div>${wrongWords.map(w=>`<div class="rd-row"><span class="rd-word">${w}</span><span class="rd-status fail">✗</span></div>`).join('')}</div>`:''}<div class="result-btns"><button class="btn btn-primary" onclick="startQuiz()">再测一次</button><button class="btn btn-secondary" onclick="goToMenu()">返回菜单</button></div></div>`;document.getElementById('quizProgress').textContent='已完成';document.getElementById('quizBarFill').style.width='100%';if(pct>=70)triggerConfetti()}
function exitQuiz(){state.quizState=null;goToMenu()}

// ===== 打卡 =====
function startCheckin(){showScreen('screen-checkin');renderCheckin()}
function renderCheckin(){const ci=state.checkinData;const year=state.calYear,month=state.calMonth;document.getElementById('streakNum').textContent=ci.streak||0;document.getElementById('ciTotalDays').textContent=ci.dates.length;document.getElementById('ciThisMonth').textContent=ci.dates.filter(d=>d.startsWith(`${year}-${String(month+1).padStart(2,'0')}`)).length;document.getElementById('ciWordsLearned').textContent=Object.values(state.masteredWords).reduce((a,b)=>a+(b?.length||0),0);const today=dateStr(new Date());const checked=ci.dates.includes(today);document.getElementById('checkinBtn').disabled=checked;document.getElementById('checkinBtn').textContent=checked?'✅ 今日已打卡':'✅ 今日打卡';const cal=document.getElementById('checkinCalendar');const firstDay=new Date(year,month,1).getDay();const daysInMonth=new Date(year,month+1,0).getDate();const m=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];let html=`<div class="cal-header"><div class="cal-month">${year}年 ${m[month]}</div><div class="cal-nav"><button onclick="changeCalMonth(-1)">&#x25C0;</button><button onclick="changeCalMonth(1)">&#x25B6;</button></div></div><div class="cal-weekdays"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div><div class="cal-days">`;for(let i=0;i<firstDay;i++)html+='<div class="cal-day empty"></div>';for(let d=1;d<=daysInMonth;d++){const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;html+=`<div class="cal-day${ci.dates.includes(ds)?' checked':''}${ds===today?' today':''}">${d}</div>`}html+='</div>';cal.innerHTML=html}
function changeCalMonth(d){state.calMonth+=d;if(state.calMonth>11){state.calMonth=0;state.calYear++}if(state.calMonth<0){state.calMonth=11;state.calYear--}renderCheckin()}
function doCheckin(){const ci=state.checkinData;const today=dateStr(new Date());if(ci.dates.includes(today))return;ci.dates.push(today);ci.streak=calcStreak(ci.dates);localStorage.setItem('qw_checkin',JSON.stringify(ci));state.checkinData=ci;renderCheckin();updateMenuStats();triggerConfetti()}
function calcStreak(dates){if(!dates.length)return 0;const sorted=[...dates].sort().reverse();const todayStr=dateStr(new Date());const yStr=dateStr(new Date(Date.now()-86400000));if(sorted[0]!==todayStr&&sorted[0]!==yStr)return 0;let streak=1;for(let i=0;i<sorted.length-1;i++){const diff=(new Date(sorted[i]).getTime()-new Date(sorted[i+1]).getTime())/86400000;if(Math.round(diff)===1)streak++;else break}return streak}
function dateStr(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}

function triggerConfetti(){const c=document.createElement('div');c.className='confetti-container';const colors=['#FF6B6B','#FF9F43','#FECA57','#48DBFB','#0ABDE3','#10AC84','#FF9FF3','#1DD1A1','#FFE66D'];for(let i=0;i<60;i++){const p=document.createElement('div');p.className='confetti-piece';const color=colors[Math.floor(Math.random()*colors.length)];const size=6+Math.random()*8;p.style.cssText=`width:${size}px;height:${size}px;background:${color};left:${Math.random()*100}%;border-radius:${Math.random()>0.5?'50%':'2px'};`;p.style.setProperty('--fall-duration',(2+Math.random()*2)+'s');p.style.setProperty('--fall-delay',(Math.random()*0.5)+'s');c.appendChild(p)}document.body.appendChild(c);setTimeout(()=>c.remove(),4000)}

function init(){initGradeGrid();initSpeech();document.addEventListener('keydown',e=>{const l=document.getElementById('screen-learning');if(!l.classList.contains('active'))return;if(e.key==='ArrowRight')nextWord();else if(e.key==='ArrowLeft')prevWord();else if(e.key===' '){e.preventDefault();toggleFlip()}else if(e.key==='m'||e.key==='M')toggleMaster()})}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
